<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles | Mubashir Ahmed</title>
    <meta name="description" content="Thoughts, tutorials, and insights on frontend development, AI, and modern web design by Mubashir Ahmed.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div class="noise-bg"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Mubashir<span>.</span></a>
            <ul class="nav-links">
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="index.html#experience" class="nav-link">Experience</a></li>
                <li><a href="index.html#projects" class="nav-link">Projects</a></li>
                <li><a href="articles.html" class="nav-link">Articles</a></li>
            </ul>
            <a href="index.html#contact" class="btn primary-btn magnetic">Let's Talk</a>
        </div>
    </nav>

    <main>
        <!-- Articles Hero -->
        <section class="articles-page-hero section">
            <div class="hero-glow"></div>
            <div class="container">
                <p class="greeting reveal-up"><i class="fa-solid fa-pen-nib"></i> My Articles</p>
                <h1 class="hero-title reveal-up delay-1">Thoughts & <span class="gradient-text">Insights</span></h1>
                <p class="hero-subtitle reveal-up delay-2">Deep dives into frontend development, design philosophy, and the evolving role of AI in building the web.</p>
            </div>
        </section>

        <!-- Dynamic Articles Grid -->
        <section class="section" style="padding-top: 0;">
            <div class="container">
                <div id="articles-grid" class="articles-grid">
                    <!-- Loaded dynamically from localStorage -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 Mubashir Ahmed. Designed & Built with passion.</p>
            <div class="social-links">
                <a href="#" class="social-link magnetic" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
                <a href="#" class="social-link magnetic" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="#" class="social-link magnetic" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </div>
    </footer>

    <script src="storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const articlesGrid = document.getElementById('articles-grid');
            const articles = getArticles();

            if (articles.length === 0) {
                articlesGrid.innerHTML = '<p style="text-align:center; color:var(--text-secondary); grid-column:1/-1; padding:4rem 0;">No articles yet. Check back soon!</p>';
                return;
            }

            articlesGrid.innerHTML = articles.map((a, i) => `
                <div class="article-card glass-card reveal-up ${i > 0 ? 'delay-' + Math.min(i, 3) : ''} magnetic-card">
                    <div class="article-image">
                        <div class="placeholder-img ${a.coverStyle}"></div>
                    </div>
                    <div class="article-content">
                        <span class="article-category tag">${a.category}</span>
                        <h3 class="article-title">${a.title}</h3>
                        <p>${a.summary}</p>
                        <div class="article-meta">
                            <span><i class="fa-regular fa-calendar"></i> ${a.date}</span>
                            <span><i class="fa-regular fa-clock"></i> ${a.readTime}</span>
                        </div>
                        <a href="article.html?slug=${a.slug}" class="article-link magnetic">Read Article <i class="fa-solid fa-arrow-right"></i></a>
                    </div>
                </div>
            `).join('');

            // Re-init reveal for dynamic elements
            setTimeout(() => {
                const revealElements = document.querySelectorAll('.reveal-up:not(.active)');
                const revealObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
                revealElements.forEach(el => revealObserver.observe(el));
            }, 100);
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
