<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | Mubashir Ahmed</title>
    <meta name="description" content="Article by Mubashir Ahmed.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div class="noise-bg"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Mubashir<span>.</span></a>
            <ul class="nav-links">
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="index.html#experience" class="nav-link">Experience</a></li>
                <li><a href="index.html#projects" class="nav-link">Projects</a></li>
                <li><a href="articles.html" class="nav-link">Articles</a></li>
            </ul>
            <a href="index.html#contact" class="btn primary-btn magnetic">Let's Talk</a>
        </div>
    </nav>

    <main>
        <article class="article-detail section">
            <div class="container">
                <a href="articles.html" class="back-link reveal-up"><i class="fa-solid fa-arrow-left"></i> Back to Articles</a>

                <!-- Dynamic content loads here -->
                <div id="article-loader" class="loading-container">
                    <div class="loading-spinner"></div>
                    <p>Loading article...</p>
                </div>

                <div id="article-content-area" style="display:none;">
                    <header class="article-detail-header reveal-up">
                        <span id="art-category" class="article-category tag"></span>
                        <h1 id="art-title" class="article-detail-title"></h1>
                        <div id="art-meta" class="article-detail-meta"></div>
                    </header>

                    <div class="article-detail-cover reveal-up">
                        <div id="art-cover" style="height: 350px; border-radius: 20px;"></div>
                    </div>

                    <div id="art-body" class="article-detail-body reveal-up"></div>

                    <nav id="art-nav" class="article-nav reveal-up"></nav>
                </div>

                <div id="article-not-found" style="display:none;" class="empty-state">
                    <i class="fa-regular fa-newspaper"></i>
                    <p>Article not found.</p>
                    <a href="articles.html" class="btn primary-btn" style="margin-top:1rem;">Back to Articles</a>
                </div>
            </div>
        </article>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 Mubashir Ahmed. Designed & Built with passion.</p>
            <div class="social-links">
                <a href="#" class="social-link magnetic" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
                <a href="#" class="social-link magnetic" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="#" class="social-link magnetic" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </div>
    </footer>

    <script src="storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const loader = document.getElementById('article-loader');
            const contentArea = document.getElementById('article-content-area');
            const notFound = document.getElementById('article-not-found');

            if (!slug) {
                loader.style.display = 'none';
                notFound.style.display = 'block';
                return;
            }

            const article = getArticleBySlug(slug);
            if (!article) {
                loader.style.display = 'none';
                notFound.style.display = 'block';
                return;
            }

            // Set page title
            document.title = article.title + ' | Mubashir Ahmed';
            document.querySelector('meta[name="description"]').content = article.summary;

            // Fill content
            document.getElementById('art-category').textContent = article.category;
            document.getElementById('art-title').innerHTML = article.title;
            document.getElementById('art-meta').innerHTML = `
                <span><i class="fa-regular fa-calendar"></i> ${article.date}</span>
                <span><i class="fa-regular fa-clock"></i> ${article.readTime}</span>
                <span><i class="fa-regular fa-user"></i> Mubashir Ahmed</span>
            `;
            document.getElementById('art-cover').className = `placeholder-img ${article.coverStyle}`;
            document.getElementById('art-body').innerHTML = article.content;

            // Prev/Next navigation
            const allArticles = getArticles();
            const currentIdx = allArticles.findIndex(a => a.slug === slug);
            const prev = currentIdx > 0 ? allArticles[currentIdx - 1] : null;
            const next = currentIdx < allArticles.length - 1 ? allArticles[currentIdx + 1] : null;

            document.getElementById('art-nav').innerHTML = `
                <div class="article-nav-item prev ${prev ? '' : 'disabled'}">
                    ${prev ? `<a href="article.html?slug=${prev.slug}">
                        <span class="article-nav-label"><i class="fa-solid fa-arrow-left"></i> Previous</span>
                        <span class="article-nav-title">${prev.title}</span>
                    </a>` : `<span class="article-nav-label"><i class="fa-solid fa-arrow-left"></i> Previous</span>
                    <span class="article-nav-title">No previous article</span>`}
                </div>
                <div class="article-nav-item next ${next ? '' : 'disabled'}">
                    ${next ? `<a href="article.html?slug=${next.slug}">
                        <span class="article-nav-label">Next <i class="fa-solid fa-arrow-right"></i></span>
                        <span class="article-nav-title">${next.title}</span>
                    </a>` : `<span class="article-nav-label">Next <i class="fa-solid fa-arrow-right"></i></span>
                    <span class="article-nav-title">No next article</span>`}
                </div>
            `;

            // Show content
            loader.style.display = 'none';
            contentArea.style.display = 'block';

            // Re-trigger reveal animations
            setTimeout(() => {
                document.querySelectorAll('.reveal-up').forEach(el => el.classList.add('active'));
            }, 50);
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
